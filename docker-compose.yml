version: "3.9"

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: pt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prodtracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-productivity_tracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prodtracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pt-network

  # ============================================
  # Redis Cache & Realtime
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: pt-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devredispass} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pt-network

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pt-backend
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-prodtracker}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-productivity_tracker}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - SCREENSHOT_ENCRYPTION_KEY=${SCREENSHOT_ENCRYPTION_KEY:-dev-encryption-key-32bytes!!}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - screenshot_data:/app/uploads/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pt-network

  # ============================================
  # Next.js Admin Dashboard
  # ============================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pt-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pt-network

  # ============================================
  # Nginx Reverse Proxy (Production)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: pt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - pt-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  screenshot_data:
    driver: local

networks:
  pt-network:
    driver: bridge
